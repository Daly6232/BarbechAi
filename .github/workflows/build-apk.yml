name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform (Capacitor)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build unsigned debug APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Rename APK with commit info
        run: |
          mkdir -p ../release-output
          cp "${{ steps.apk.outputs.path }}" ../release-output/BarbechAI-$(date +%Y%m%d)-${GITHUB_SHA::7}.apk
          cp "${{ steps.apk.outputs.path }}" ../release-output/BarbechAI-latest.apk

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "BarbechAI (latest build)"
          body: |
            Automatically built from commit ${{ github.sha }} on ${{ github.ref_name }}.
            This is an **unsigned debug APK** for sideloading — not a Play Store build.
            Android will warn about "unknown sources" on install; that's expected.
          prerelease: true
          files: release-output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
